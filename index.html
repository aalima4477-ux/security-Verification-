<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Security Verification</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #ffffff; color: #202124; }
        .container { text-align: center; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #4285f4; border-radius: 50%; width: 35px; height: 35px; animation: spin 1s linear infinite; margin: 0 auto 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 18px; font-weight: 400; margin-bottom: 8px; }
        p { font-size: 14px; color: #5f6368; }
    </style>
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h1>Verifying secure session...</h1>
        <p>Please do not close this window</p>
    </div>
    <script src="script.js"></script>
</body>
</html>
